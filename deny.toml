# cargo-deny configuration — supply-chain governance for the release.
# Run locally: `cargo deny check` (or via CI `.github/workflows/ci.yml`).
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
# Fail CI on any active RustSec advisory affecting dependencies.
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
ignore = []

[licenses]
# engram is MIT. Allow only permissive licenses; copyleft (GPL/AGPL/LGPL)
# and "unlicensed" fail the check so they can never sneak into a release.
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
# Warn (not fail) on duplicate crate versions — informational, since some
# transitive duplication is unavoidable with a large dependency tree.
multiple-versions = "warn"
wildcards = "deny"
